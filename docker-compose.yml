version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: transitops_password_123
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transitops-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: transitops-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@transitops.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - transitops-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  transitops-network:
    driver: bridge
